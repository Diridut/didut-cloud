<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #0f172a !important; }
        .card-custom { border: none; border-radius: 14px; background-color: #ffffff; }
        .table thead { background-color: #f1f5f9; }
        .form-control:focus { border-color: #0f172a; box-shadow: 0 0 0 0.2rem rgba(15, 23, 42, 0.15); }
        .btn-dark-custom { background-color: #0f172a; color: white; border: none; transition: background 0.2s; }
        .btn-dark-custom:hover { background-color: #1e293b; color: white; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
                <i class="fa-solid fa-cloud text-info"></i> SIAKAD CLOUD
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active fw-medium" href="/mahasiswa"><i class="fa-solid fa-user-graduate me-1"></i> Mahasiswa</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/matakuliah"><i class="fa-solid fa-book-open me-1"></i> Mata Kuliah</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/nilai"><i class="fa-solid fa-star me-1"></i> Nilai</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <!-- Form Card -->
            <div class="col-md-4">
                <div class="card card-custom shadow-sm p-4">
                    <h5 class="fw-bold text-dark mb-4 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-user-plus text-primary"></i> Tambah Mahasiswa
                    </h5>
                    <form action="/tambah-mahasiswa" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">NIM</label>
                            <input type="text" class="form-control py-2 rounded-3" name="nim" placeholder="Masukkan NIM" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">Nama Lengkap</label>
                            <input type="text" class="form-control py-2 rounded-3" name="nama" placeholder="Masukkan Nama" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">Jurusan</label>
                            <input type="text" class="form-control py-2 rounded-3" name="jurusan" placeholder="Masukkan Jurusan" required>
                        </div>
                        <button type="submit" class="btn btn-dark-custom w-100 py-2.5 fw-bold rounded-3 shadow-sm mt-3">
                            <i class="fa-solid fa-paper-plane me-1"></i> Simpan ke Cloud
                        </button>
                    </form>
                </div>
            </div>

            <!-- Table Card -->
            <div class="col-md-8">
                <div class="card card-custom shadow-sm p-4">
                    <h5 class="fw-bold text-dark mb-4 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-database text-success"></i> Daftar Mahasiswa di Cloud
                    </h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr class="text-secondary small fw-bold">
                                    <th class="py-3 border-0">NIM</th>
                                    <th class="py-3 border-0">NAMA LENGKAP</th>
                                    <th class="py-3 border-0">JURUSAN</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for mhs in mahasiswa_list %}
                                <tr>
                                    <td class="fw-bold text-dark py-3">{{ mhs.nim }}</td>
                                    <td class="text-secondary">{{ mhs.nama }}</td>
                                    <td><span class="badge bg-light text-dark border px-3 py-2 rounded-pill fw-medium">{{ mhs.jurusan }}</span></td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-5">
                                        <i class="fa-regular fa-folder-open fa-2xl d-block mb-3 opacity-50"></i>
                                        Belum ada data mahasiswa di database cloud.
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
