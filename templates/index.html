<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Akademik Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #0f172a !important; }
        .card-stat { border: none; border-radius: 12px; transition: transform 0.2s; }
        .card-stat:hover { transform: translateY(-5px); }
        .icon-shape { width: 48px; height: 48px; background: #e2e8f0; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
                <i class="fa-solid fa-cloud text-info"></i> SIAKAD CLOUD
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link active fw-medium" href="/"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/mahasiswa"><i class="fa-solid fa-user-graduate me-1"></i> Mahasiswa</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/matakuliah"><i class="fa-solid fa-book-open me-1"></i> Mata Kuliah</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium text-white-50" href="/nilai"><i class="fa-solid fa-star me-1"></i> Nilai</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="p-5 bg-white rounded-4 shadow-sm border-0">
                    <h1 class="fw-bold text-dark mb-2">Selamat Datang di SIAKAD Cloud 👋</h1>
                    <p class="text-muted mb-0">Sistem Informasi Akademik Sederhana Berbasis Cloud Storage & Hosting.</p>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-stat shadow-sm p-3 bg-white">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted fw-medium small text-uppercase">Total Mahasiswa</span>
                            <h2 class="fw-bold text-dark mt-2 mb-0">{{ total_mahasiswa }}</h2>
                        </div>
                        <div class="icon-shape bg-primary-subtle text-primary fs-4">
                            <i class="fa-solid fa-users"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat shadow-sm p-3 bg-white">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted fw-medium small text-uppercase">Mata Kuliah</span>
                            <h2 class="fw-bold text-dark mt-2 mb-0">{{ total_matakuliah }}</h2>
                        </div>
                        <div class="icon-shape bg-success-subtle text-success fs-4">
                            <i class="fa-solid fa-book-open"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-stat shadow-sm p-3 bg-white">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <span class="text-muted fw-medium small text-uppercase">Cloud Server</span>
                            <h2 class="fw-bold text-success mt-2 mb-0 fs-5">Connected</h2>
                        </div>
                        <div class="icon-shape bg-info-subtle text-info fs-4">
                            <i class="fa-solid fa-server"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
